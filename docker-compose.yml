version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: segmentation-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8000/predict-segment
    container_name: segmentation-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
